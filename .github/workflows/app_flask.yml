name: This_is_flask_app

on:
  push:
    branches:
      - main

jobs:
  Flask_python:
    runs-on: ubuntu-latest

    steps:
      - name: "Clone the code to the runner"
        uses: actions/checkout@v6.0.2

      - name: "This would install Python"
        uses: actions/setup-python@v6.2.0

      - name: "Install dependencies required in requirements.txt"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: "Running the Flask app"
        run: |
          python app.py &
          sleep 10

      - name: "Verify app is running"
        run: |
          curl http://127.0.0.1:5000
          echo "Verification is done"

      - name: "Build Docker Image"
        run: docker build -t flask-app .

      - name: "Run Docker Container"
        run: docker run -d -p 5001:5000 flask-app

      - name: "Wait for container"
        run: sleep 10

      - name: "Verify Docker container"
        run: |
          curl http://127.0.0.1:5001
          echo "Docker container verification done"
